<div class = "flex gap-1 items-center"> 
    <img class = 'h-7 w-7' src = '/list/bullet.png'>
    <div class = "drop-shadow flex text-lg h-10 bg-[#FFEAF5] p-5 items-center justify-between mt-2 flex-1">
        <div>
            {{ taskData()?.name }}
        </div>
        <div class = "flex">
            @if (taskData()?.done) {
                <img class = 'h-7 w-7' src = '/list/green.png'>
            }
            @else {
                <img class = 'h-7 w-7' src = '/list/red_star.png'>
                <button class = "cursor-pointer" (click) = "completeTask(taskData()?.name)"><img class = 'h-7 w-7' src = '/list/green.png'></button>
            }
            <!-- delete button -->
            <button class = 'cursor-pointer' (click) = "deleteTask(taskData()?.name)"><img class = 'h-7 w-7' src = '/list/axe.png'></button>
        </div>
    </div>
</div>
