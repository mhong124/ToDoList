<h2 mat-dialog-title>Delete Task</h2>
<mat-dialog-content>
  <p> {{ data.message }} </p>
</mat-dialog-content>
<mat-dialog-actions class = "gap-2">
  <button  class = "cursor-pointer drop-shadow bg-white p-2 rounded-md" matButton mat-dialog-close>Cancel</button>
  <button  class = "bg-[#FFEAF5] rounded-md drop-shadow p-2 cursor-pointer" matButton [mat-dialog-close]="true" cdkFocusInitial>Confirm</button>
</mat-dialog-actions>
