<h2 mat-dialog-title>Delete Task</h2>
<mat-dialog-content>
  <p>Are you sure you want to delete this task?</p>
</mat-dialog-content>
<mat-dialog-actions>
  <button matButton mat-dialog-close>Cancel</button>
  <button matButton [mat-dialog-close]="true" cdkFocusInitial>Confirm</button>
</mat-dialog-actions>
