<div class = "min-h-dvh w-full bg-[#CCFAC7] p-10">
    <!-- title -->

    <div class = "w-3/5 mx-auto flex items-center justify-center md:text-7xl  text-3xl text-white font-bold m-10 bg-[#9DD797] p-10 rounded-md shadow-xl">
       <img src = '/list/brush.png' class = 'w-10 h-10 md:w-20 md:h-20'> To Do List! <img src = '/list/goods.png' class = 'w-10 h-10 md:w-20 md:h-20'>
    </div>

    <div class = "p-4 bg-white shadow-md rounded-md">
        <!-- eventually add searching and filtering -->

        <!-- task bar -->
        <div class = 'flex m-5 justify-between items-center'>
            <!-- add task -->
            <div class = 'flex gap-3 '>
                <input [(ngModel)] = 'newTask' placeholder = "New Task...." class = 'px-5 lg-text-input bg-white focus:border-[#FFEAF5]-500 outline-none rounded-sm h-12 w-full md:w-1/2 lg:w-80 drop-shadow text-xl' type = "text">
                <!-- date stuff -->
                <div>
                    <mat-form-field class="w-30 md:w-1/2 lg:w-60 mat-dense !h-18 ">
                        <mat-label >Deadline</mat-label>
                        <input matInput [matDatepicker]="picker" [(ngModel)] = 'newDate'>
                        <mat-datepicker-toggle matIconSuffix [for]="picker">
                            <mat-icon matDatepickerToggleIcon><img src = '/list/wand.png' class = 'w-7 h-7'></mat-icon>
                        </mat-datepicker-toggle>
                        <mat-datepicker #picker></mat-datepicker>
                    </mat-form-field>
                </div>
                <!-- add button -->
                <button class = 'ml-auto cursor-pointer h-12 w-10 bg-[#FFEAF5] rounded-sm drop-shadow w-30 flex items-center p-2 text-lg' (click) = "addTask()">
                    <img class = 'w-7 h-7' src = '/list/gyroid.png' > Add Task
                </button>
            </div>

            <!-- delete and filter -->
            <div class = "flex gap-2 justify-center items-center pb-6">
                <button class = 'cursor-pointer' (click) = "openDialog()"><img src = "/list/can.png" class = "h-10 w-10"></button>
                <list-filter-toggle [(status)] = "filter" (statusChange) = "filterTasks()"></list-filter-toggle>
            </div>
        </div>

        <!-- list of all tasks-->
        <div class = "bg-[#EBFFE8] rounded-md min-h-100 m-5 drop-shadow p-5">
            @for (task of displayedTasks; track task.name) {
                <single-task [taskData] = "task" (callComplete)="markComplete($event)" (callDelete)="markDeleted($event)"/>
            }
        </div>
    </div>
</div>
