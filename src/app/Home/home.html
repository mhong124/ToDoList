<div class = "min-h-dvh w-full bg-[#CCFAC7]">
    <div>
        <h1 class = "text-6xl p-10">To Do List</h1>
    </div>

    <!-- eventually add searching and filtering -->

    <!-- add task -->
    <div class = 'flex justify-between m-10 my-0'>
        <div class = 'flex gap-3'>
        <input [(ngModel)] = 'newTask' class = 'lg-text-input bg-white focus:border-[#FFEAF5]-500 outline-none rounded-sm h-12 w-full md:w-1/2 lg:w-100 drop-shadow text-xl' type = "text">
        <!-- date stuff -->
         <div>
            <mat-form-field class="example-full-width mat-dense !h-18">
                <mat-label>Deadline</mat-label>
                <input matInput [matDatepicker]="picker" [(ngModel)] = 'newDate'>
                <mat-datepicker-toggle matIconSuffix [for]="picker">
                    <mat-icon matDatepickerToggleIcon><img src = '/list/wand.png' class = 'w-7 h-7'></mat-icon>
                </mat-datepicker-toggle>
                <mat-datepicker #picker></mat-datepicker>
            </mat-form-field>
        </div>
        </div>
        <!-- add button -->
        <button class = 'cursor-pointer h-10 w-10 bg-[#FFEAF5] rounded-sm drop-shadow w-30 flex items-center p-2 text-lg' (click) = "addTask()">
            <img class = 'w-7 h-7' src = '/list/gyroid.png' > Add Task
        </button>
    </div>

    <!-- list of all tasks-->
    <div class = "bg-white rounded-md min-h-100 m-10 drop-shadow p-5 mt-5">
        @for (task of allTasks; track task.name) {
            <single-task [taskData] = "task" (callComplete)="markComplete($event)" (callDelete)="markDeleted($event)"/>
        }
    </div>
    <div>
        hello
    </div>
</div>
