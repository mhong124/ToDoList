<div class = "bg-[#FFD7EC] min-h-screen min-w-screen p-10">
    <div class = "flex items-center justify-center mx-auto drop-shadow bg-[#FAAAD5] w-1/2 h-40 rounded-md text-5xl lg:text-7xl text-bold text-white">
        <img src = "./mood/raccoon.png" class = "w-20 h-20 mr-5">
        Mood Board
        <img src = "./mood/cat.png" class = "w-20 h-20 ml-5">
    </div>

    <div class = "flex flex-col justify-center items-center gap-5 m-10">
        <div class = "flex justify-center items-center gap-5 w-full">
            <div #download class = "flex justify-center items-center gap-5 p-5 w-3/5 bg-[url(/mood/cute2.jpg)] drop-shadow bg-cover rounded-md">
                <div class = 'bg-white rounded-md w-40 h-40 drop-shadow flex justify-center items-center'>
                    <img src = 'mood/lloid.png' class = 'w-30 h-30'>
                </div>
                <div class = 'bg-white rounded-md w-40 h-40 drop-shadow flex justify-center items-center'>
                    <img src = 'mood/bob.png' class = 'w-30 h-30'>
                </div>
                <div class = 'bg-white rounded-md w-40 h-40 drop-shadow flex justify-center items-center'>
                    <img src = 'mood/heart.png' class = 'w-30 h-30'>
                </div>
            </div>

            <div class = 'flex flex-col justify-center items-center'>
                <img src = '/mood/save.png' class = 'w-15 h-15 cursor-pointer' (click) = "captureMood()">
                <img src = '/mood/present.png' class = 'w-15 h-15 cursor-pointer'>
            </div>
        </div>

        <div class = "p-5 bg-white rounded-md w-5/6 mx-auto drop-shadow">
            <mat-tab-group dynamicHeight>
            <mat-tab>
                <ng-template mat-tab-label>
                    <img src = '/list/gyroid.png' class = 'w-5 h-5'>
                    Gyroids
                </ng-template>
                <div class="mat-elevation-z4 h-100 overflow-y-auto p-4">
                    Small
                </div>
            </mat-tab>
            <mat-tab>
                <ng-template mat-tab-label>
                    <img src = '/mood/lolly.png' class = 'w-5 h-5'>
                    Villagers
                </ng-template>
                <div class="mat-elevation-z4  h-100 overflow-y-auto p-4">
                    Large content
                </div>
            </mat-tab>
            <mat-tab>
                <ng-template mat-tab-label>
                    <img src = '/mood/items.png' class = 'w-5 h-5'>
                    Items
                </ng-template>
                <div class="mat-elevation-z4 h-100 overflow-y-auto p-4">
                    Small
                </div>
            </mat-tab>
            </mat-tab-group>
        </div>
    </div>
</div>
